name: Release check

# Run manually before cutting a release. Performs the same checks as CI
# plus the external-adopter smoke test, then prints what each tarball
# would contain. Does NOT publish or tag.

on:
  workflow_dispatch:

jobs:
  release-check:
    name: Pre-release validation
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20.x, 22.x]

    steps:
      - uses: actions/checkout@v6
        with:
          # Smoke script needs full git history to git-archive HEAD.
          fetch-depth: 0

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck (with cleaned dist, mirrors fresh-clone state)
        run: npm run typecheck:clean

      - name: Run tests
        run: npm test

      - name: Build publishable packages
        run: npm run build

      - name: Pack dry-run
        run: npm run pack:dry-run

      - name: External adopter smoke test
        run: npm run smoke:external

      - name: Print tarball contents
        run: |
          for pkg in packages/core packages/sdk packages/scanner packages/openapi packages/cli apps/mcp-server; do
            echo "=========================================="
            echo "Tarball: $pkg"
            echo "=========================================="
            (cd "$pkg" && npm pack --dry-run 2>&1)
            echo ""
          done

      - name: Build demo-app
        run: npx next build
        working-directory: apps/demo-app

      - name: Build studio
        run: npx next build
        working-directory: apps/studio
