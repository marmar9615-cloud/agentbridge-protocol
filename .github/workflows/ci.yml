name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test, build, and pack
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20.x, 22.x]

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck packages
        run: |
          npx tsc -p packages/core/tsconfig.json --noEmit
          npx tsc -p packages/sdk/tsconfig.json --noEmit
          npx tsc -p packages/scanner/tsconfig.json --noEmit
          npx tsc -p packages/openapi/tsconfig.json --noEmit
          npx tsc -p packages/cli/tsconfig.json --noEmit
          npx tsc -p apps/mcp-server/tsconfig.json --noEmit

      - name: Run tests
        run: npm test

      - name: Build publishable packages
        run: npm run build

      - name: Pack dry-run
        run: npm run pack:dry-run

      - name: Build demo-app
        run: npx next build
        working-directory: apps/demo-app

      - name: Build studio
        run: npx next build
        working-directory: apps/studio
