version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels:
      - dependencies
    groups:
      types:
        patterns:
          - "@types/*"
      build-tooling:
        patterns:
          - tsup
          - typescript
          - tsx
          - vitest
          - concurrently
      next-react:
        patterns:
          - next
          - react
          - react-dom

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    open-pull-requests-limit: 3
    labels:
      - dependencies
      - github-actions
